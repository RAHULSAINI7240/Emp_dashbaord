services:
  - type: web
    name: emp-dashboard-backend
    runtime: node
    rootDir: autovyn-backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:push && npm run db:core-users
    startCommand: npm start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - autovyn-backend/**
        - render.yaml

  - type: web
    name: emp-dashboard-frontend
    runtime: static
    rootDir: autovyn-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist/autovyn-web/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildFilter:
      paths:
        - autovyn-web/**
        - render.yaml
