<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="field">
      <mat-label>Comment</mat-label>
      <textarea matInput rows="4" formControlName="comment" placeholder="Add your note"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" (click)="submit()">{{ data.submitLabel }}</button>
</mat-dialog-actions>
