name: Build Desktop Agent

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: autovyn-desktop
        run: npm ci

      - name: Build Windows installer
        working-directory: autovyn-desktop
        run: npx electron-builder --win nsis --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: autovyn-desktop/dist/Autovyn-Desktop-Setup.exe

      - name: Upload artifact (for manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: autovyn-desktop/dist/Autovyn-Desktop-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: autovyn-desktop
        run: npm ci

      - name: Build Linux installers
        working-directory: autovyn-desktop
        run: npx electron-builder --linux deb AppImage

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            autovyn-desktop/dist/Autovyn-Desktop.deb
            autovyn-desktop/dist/Autovyn-Desktop.AppImage

      - name: Upload artifacts (for manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            autovyn-desktop/dist/Autovyn-Desktop.deb
            autovyn-desktop/dist/Autovyn-Desktop.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: autovyn-desktop
        run: npm ci

      - name: Build macOS installer
        working-directory: autovyn-desktop
        run: npx electron-builder --mac dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: autovyn-desktop/dist/Autovyn-Desktop.dmg

      - name: Upload artifact (for manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: autovyn-desktop/dist/Autovyn-Desktop.dmg
